server:
  host: "0.0.0.0"
  port: 8080
  mode: "dev"
  name: "dispute-gateway"

database:
  host: "127.0.0.1"
  port: 4000
  user: "root"
  password: ""
  dbname: "dispute_resolve"
  charset: "utf8mb4"
  max_idle: 20
  max_open: 100

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  cluster: false
  addrs: []

elasticsearch:
  addresses:
    - "http://127.0.0.1:9200"
  username: ""
  password: ""

rocketmq:
  nameserver:
    - "127.0.0.1:9876"
  group_name: "dispute-gateway-group"
  retry_times: 3

jwt:
  secret: "dispute-resolve-jwt-secret-2024"
  expire_time: 86400
  issuer: "dispute-resolve"

minio:
  endpoint: "127.0.0.1:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false
  bucket: "dispute"

deepseek:
  api_key: "sk-your-deepseek-api-key"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  max_tokens: 4096
  temperature: 0.7

milvus:
  address: "127.0.0.1:19530"
  username: ""
  password: ""
  collection: "law_articles"
  dimension: 1536
  case_collection: "case_library"
  case_dimension: 1536

flowable:
  base_url: "http://127.0.0.1:8080/flowable-task"
  username: "admin"
  password: "test"

services:
  user-service: "127.0.0.1:9001"
  dispute-service: "127.0.0.1:9002"
  workflow-service: "127.0.0.1:9003"
  ai-service: "127.0.0.1:9004"
  notification-service: "127.0.0.1:9005"

service-ports:
  user: 9001
  dispute: 9002
  workflow: 9003
  ai: 9004
  notification: 9005

trtc:
  sdk_app_id: 1400000000
  secret_key: "your-trtc-secret-key"
  admin_user_id: "administrator"
  record_callback_url: "https://your-domain.com/api/v1/public/video/record-callback"
  record_storage_path: "dispute/video"
  record_segment_sec: 600
  max_queue_size: 50
  queue_check_interval: 30
  tencent_cos:
    region: "ap-guangzhou"
    bucket: "dispute-trtc-record-1300000000"
    secret_id: "your-cos-secret-id"
    secret_key: "your-cos-secret-key"

fadada:
  api_domain: "https://api.fadada.com"
  app_id: "your-fadada-app-id"
  app_secret: "your-fadada-app-secret"
  customer_id: "your-fadada-customer-id"
  cert_path: ""
  auto_seal: true
  cross_page_seal: true
  notify_url: "https://your-domain.com/api/v1/public/esign/fadada-callback"

blockchain:
  api_endpoint: "https://bc-api.example.com"
  app_code: "your-bc-app-code"
  app_key: "your-bc-app-key"
  app_secret: "your-bc-app-secret"
  chain_name: "judicial-evidence-chain"
  contract_addr: "0x1234567890abcdef"
  cert_template_id: "cert-tpl-001"
  qr_code_base_url: "https://verify.your-domain.com/cert"

aliyun-voice:
  access_key_id: "your-aliyun-access-key-id"
  access_key_secret: "your-aliyun-access-key-secret"
  region_id: "cn-hangzhou"
  caller_show_number: "400-123-4567"
  tts_code: "TTS_123456789"
  asr_vocab_id: "vocab-123456"
  callback_url: "https://your-domain.com/api/v1/public/callback/aliyun-voice"
  endpoint: "dyvmsapi.aliyuncs.com"
