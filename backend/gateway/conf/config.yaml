  port: 8080
  mode: "dev"
  name: "dispute-gateway"

database:
  host: "127.0.0.1"
  port: 4000
  user: "root"
  password: ""
  dbname: "dispute_resolve"
  charset: "utf8mb4"
  max_idle: 20
  max_open: 100

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
